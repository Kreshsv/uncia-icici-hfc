worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;

    log_format upstream_timing
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        'request_id=$request_id '
        'request_time=$request_time '
        'upstream_addr=$upstream_addr '
        'upstream_status=$upstream_status '
        'upstream_connect_time=$upstream_connect_time '
        'upstream_header_time=$upstream_header_time '
        'upstream_response_time=$upstream_response_time '
        'http_referer="$http_referer" '
        'user_agent="$http_user_agent"';

    access_log /var/log/nginx/access.log upstream_timing;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65s;
    keepalive_requests 1000;

    client_header_timeout 30s;
    client_body_timeout 120s;
    send_timeout 120s;

    client_max_body_size 0;

    proxy_http_version 1.1;

    proxy_connect_timeout 15s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    proxy_socket_keepalive on;

    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 16 16k;
    proxy_busy_buffers_size 32k;

    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
    proxy_next_upstream_timeout 30s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    upstream tenant_manager {
        zone tenant_manager_zone 64k;
        server 10.9.129.71:6100;
        keepalive 32;
    }

    upstream connect_engine {
        zone connect_engine_zone 64k;
        server 10.9.129.71:6101;
        keepalive 32;
    }

    upstream uam_fe {
        zone uam_fe_zone 64k;
        server 10.9.129.71:6102;
        keepalive 32;
    }

    upstream uam_be {
        zone uam_be_zone 64k;
        server 10.9.129.71:6103;
        keepalive 32;
    }

    upstream connect_fe {
        zone connect_fe_zone 64k;
        server 10.9.129.71:6104;
        keepalive 32;
    }

    upstream connect_be {
        zone connect_be_zone 64k;
        server 10.9.129.71:6105;
        keepalive 32;
    }

    upstream datamapper_fe {
        zone datamapper_fe_zone 64k;
        server 10.9.129.71:6106;
        keepalive 32;
    }

    upstream datamapper_be {
        zone datamapper_be_zone 64k;
        server 10.9.129.71:6107;
        keepalive 32;
    }

    upstream datamapper_api {
        zone datamapper_api_zone 64k;
        server 10.9.129.71:6108;
        keepalive 32;
    }

    upstream jw {
        zone jw_zone 64k;
        server 10.9.129.71:6109;
        keepalive 32;
    }

    upstream upapi {
        zone upapi_zone 64k;
        server 10.9.129.71:6111;
        keepalive 32;
    }

    server {
        listen 443 ssl;
        server_name veloctsandbox.icicihfc.com;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/veloctsandbox.key;

        ssl_protocols TLSv1.2 TLSv1.3;

        ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-G        CM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:20m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header Strict-Transport-Security
            "max-age=31536000; includeSubDomains"
            always;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

#        /*
#         * Clear the Connection header for normal HTTP proxying so
#         * upstream keepalive connections can be reused.
#         */
        proxy_set_header Connection "";

        location = /health {
            access_log off;
            default_type text/plain;
            return 200 "healthy\n";
        }

#        /*
#         * Redirect paths without trailing slash to avoid inconsistent
#         * relative URL resolution and proxy_pass URI behaviour.
#         */
        location = /main {
            return 301 /main/;
        }

        location = /engine {
            return 301 /engine/;
        }

        location = /uam {
            return 301 /uam/;
        }

        location = /useraccessbe {
            return 301 /useraccessbe/;
        }

        location = /connectfe {
            return 301 /connectfe/;
        }

        location = /connectbe {
            return 301 /connectbe/;
        }

        location = /requestmapfe {
            return 301 /requestmapfe/;
        }

        location = /requestmapbe {
            return 301 /requestmapbe/;
        }

        location = /requestmapapi {
            return 301 /requestmapapi/;
        }

        location = /requestmapreverseapi {
            return 301 /requestmapreverseapi/;
        }

#        location = /jw {
#            return 301 /jw/;
#        }

#        location = /uds {
#            return 301 /uds/;
#        }

#        /*
#         * No URI after upstream name means the original URI,
#         * including /main/, is forwarded unchanged.
#         */
        location /main/ {
            proxy_pass http://tenant_manager;
        }

#        /*
#         * URI ending in / means NGINX removes /engine/ and forwards
#         * the remaining URI to the backend root.
#         *
#         * /engine/api/test -> backend /api/test
#         */
        location /engine/ {
            proxy_pass http://connect_engine/;
        }

        location /uam/ {
            proxy_pass http://uam_fe;
        }

        location /useraccessbe/ {
            proxy_pass http://uam_be/;
        }

        location /connectfe/ {
            proxy_pass http://connect_fe;
        }

        location /connectbe/ {
            proxy_pass http://connect_be/;
        }

        location /requestmapfe/ {
            proxy_pass http://datamapper_fe;
        }

        location /requestmapbe/ {
            proxy_pass http://datamapper_be/;
        }

        location /requestmapapi/ {
            proxy_pass http://datamapper_api/;
        }

        location /requestmapreverseapi/ {
            proxy_pass http://datamapper_api/;
        }

        location /jw {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://jw;
        }

        # uds (part of LCNC)
        location /uds {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://jw;
        }

                # uds (part of LCNC)
        location /upapi {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://upapi;
        }

    }
}